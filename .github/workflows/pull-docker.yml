name: Pull docker image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:

env:
  TZ: America/New_York

jobs:
  pullImage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - img_name: redroid/redroid:11.0.0-latest
            img_tg_name: redroid_11_0_0_latest.tar.gz
          - img_name: redroid/redroid:12.0.0-latest
            img_tg_name: redroid_12_0_0_latest.tar.gz
          - img_name: erstt/redroid:15.0.0_ndk_magisk_AVD
            img_tg_name: redroid_15_0_0_ndk_magisk_AVD.tar.gz
          - img_name: redroid/redroid:13.0.0-latest
            img_tg_name: redroid_13_0_0_latest.tar.gz
          - img_name: redroid/redroid:9.0.0-latest
            img_tg_name: redroid_9_0_0_latest.tar.gz
          - img_name: cnflysky/redroid-rk3588:12.0.0-latest
            img_tg_name: cnflysky_redroid_rk3588_12_0_0_latest.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        id: basic_info
        run: |
          nproc
          uname -a
          cat /etc/*release
          free -h
          mount
          df -h
          cat /proc/cpuinfo
          cat /proc/meminfo

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: pull image
        working-directory: /builder
        run: |
          cd /builder
          sudo /bin/mv ${{ github.workspace }}/builder/* .
          ls -alh
          sudo chmod +x ./pull-docker-image.sh
          sudo ./pull-docker-image.sh ${{ matrix.img_name }} ${{ matrix.img_tg_name }}
      - name: Upload to Release
        uses: ncipollo/release-action@main
        with:
          tag: pull-images
          artifacts: /builder/release/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: 从docker hub 下载的 镜像
