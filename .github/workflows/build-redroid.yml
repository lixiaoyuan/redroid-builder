name: Build Redroid

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:

env:
  TZ: America/New_York

jobs:
  kdevbuild:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        id: basic_info
        run: |
          nproc
          uname -a
          cat /etc/*release
          free -h
          mount
          df -h
          cat /proc/cpuinfo
          cat /proc/meminfo

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: download asop
        working-directory: /builder
        run: |
          cd /builder
          sudo /bin/mv ${{ github.workspace }}/builder/* .
          ls -alh
          sudo chmod +x ./1download_asop.sh
          sudo ./1download_asop.sh

      - name: build docker
        working-directory: /builder
        run: |
          cd /builder
          sudo chmod +x ./builder/2build_docker.sh
          sudo ./builder/2build_docker.sh

      - name: build asop
        working-directory: /builder
        run: |
          cd /builder
          sudo docker run --rm \
          --privileged \
          --cap-add SYS_ADMIN \
          -v /builder:/workspace \
          -v /builder/redroid:/src \
          -w /workspace \
          redroid-builder \
          bash -c "
            cd /workspace ;
            chmod +x /workspace/3build_redroid_indocker.sh ;
            /workspace/3build_redroid_indocker.sh
          "

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3